title = "CJTrade System 啟動設定"

[[field]]
name = "broker"
label = "Broker"
type = "select"
options = ["arenax", "sinopac"]
default = "arenax"
env_out = "BROKER"
cli_arg = "--broker"

[[field]]
name = "mode"
label = "Mode"
type = "select"
options = ["backtest", "paper", "demo"]
default = "backtest"
env_out = "ARENAX_MODE"
persist_key = "mode"
cli_arg = "--mode"

[[field]]
name = "playback_speed"
label = "Playback Speed (Ignore this if you choose paper mode)"
type = "select"
options = [0.5, 1.0, 2.0, 5.0, 10.0, 30.0, 60.0, 120.0, 600.0, 1200.0, 3000.0, 6000.0, 12000.0, 30000.0]
default = 1200.0
env_out = "CJSYS_BACKTEST_PLAYBACK_SPEED"
persist_key = "playback_speed"
cli_arg = "--speed"

[[field]]
name = "watch_list"
label = "Watch List"
type = "text"
placeholder = "1234"
env_in = "CJSYS_WATCH_LIST"
env_out = "CJSYS_WATCH_LIST"
persist_key = "watch_list"
cli_arg = "--watch-list"

[[field]]
name = "fund"
label = "Initial Fund"
type = "number"
default = 500000
min = 1000
step = 1000
env_out = "INITIAL_FUND"
persist_key = "fund"
cli_arg = "--fund"

[[field]]
name = "days"
label = "Duration Days"
type = "number"
default = 365
min = 1
env_out = "CJSYS_BACKTEST_DURATION_DAYS"
persist_key = "days"
cli_arg = "--days"

[[field]]
name = "start_date"
label = "Start Date (YYYY-MM-DD, leave blank = random)"
type = "text"
placeholder = "2024-01-01"
optional = true
env_out = "CJSYS_BACKTEST_START_DATE"
persist_key = "start_date"
cli_arg = "--start-date"
