<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CJTrade - K-bar Chart</title>

    <!-- Tailwind CSS (CDN play) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Plotly.js -->
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>

    <script>
        tailwind.config = {{
            darkMode: 'class',
            theme: {{
                extend: {{
                    fontFamily: {{ sans: ['Inter', 'ui-sans-serif', 'system-ui'] }},
                    colors: {{
                        surface: '{nav_bgcolor}',
                        bg:      '{paper_bgcolor}',
                        accent:  '{accent_color}',
                        border:  '{border_color}',
                    }}
                }}
            }}
        }}
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body {{ font-family: 'Inter', ui-sans-serif, system-ui; background-color: {paper_bgcolor}; color: {font_color}; }}
        #plotly-div .plotly {{ border-radius: 12px; }}
        /* spinner */
        @keyframes spin {{ to {{ transform: rotate(360deg); }} }}
        .spin {{ animation: spin 1s linear infinite; }}
    </style>
</head>

<body class="min-h-screen" style="background-color:{paper_bgcolor};color:{font_color}">

    <!-- Navbar -->
    <nav class="flex items-center justify-between px-6 py-3 shadow-md border-b border-white/10"
         style="background-color:{nav_bgcolor}">
        <span class="font-semibold text-lg tracking-tight" style="color:{font_color}">
            &#9654; CJTrade
        </span>
        <div class="flex items-center gap-3">
            <!-- Theme selector -->
            <div class="relative group">
                <button class="flex items-center gap-1 text-sm px-3 py-1 rounded border border-white/20
                               hover:border-white/40 transition-colors"
                        style="color:{font_color}" id="themeBtn">
                    &#9681; <span id="themeLabel">{theme_name}</span>
                </button>
                <ul id="themeMenu"
                    class="hidden absolute right-0 mt-1 w-32 rounded shadow-lg border border-white/10 z-50 text-sm"
                    style="background-color:{nav_bgcolor}">
                    <li><a href="#" data-theme="nordic"  class="block px-4 py-2 hover:opacity-80">Nordic</a></li>
                    <li><a href="#" data-theme="gruvbox" class="block px-4 py-2 hover:opacity-80">Gruvbox</a></li>
                    <li><a href="#" data-theme="dark"    class="block px-4 py-2 hover:opacity-80">Dark</a></li>
                    <li><a href="#" data-theme="light"   class="block px-4 py-2 hover:opacity-80">Light</a></li>
                </ul>
            </div>
            <!-- Live indicator -->
            <span id="liveIndicator"
                  class="flex items-center gap-1.5 text-xs px-2 py-1 rounded-full border border-white/20"
                  style="color:{font_color}">
                <span id="liveDot" class="inline-block w-2 h-2 rounded-full bg-green-400"></span>
                <span id="liveText">Live</span>
            </span>
        </div>
    </nav>

    <!-- Chart area -->
    <main class="flex justify-center items-start px-4 py-6">
        <div id="chart-wrapper"
             class="w-full rounded-2xl overflow-hidden shadow-2xl border border-white/5 p-4"
             style="max-width:{chart_width}px; background-color:{paper_bgcolor}">
            <!-- Live update stamp (hidden) -->
            <span id="live-stamp" style="display:none">{live_stamp}</span>
            <!-- Embedded Plotly JSON for live polling -->
            <script id="live-data" type="application/json">{live_plotly_json}</script>
            <div id="chart-container">
                {chart_content}
            </div>
        </div>
    </main>

    <!-- Theme & Live-update JS -->
    <script>
    // ── Theme configs ──────────────────────────────────────────────────────────
    const THEMES = {{
        nordic:  {{ bg:'#2e3440', nav:'#3b4252', fg:'#eceff4', grid:'#434c5e' }},
        gruvbox: {{ bg:'#282828', nav:'#32302f', fg:'#ebdbb2', grid:'#504945' }},
        dark:    {{ bg:'#0d1117', nav:'#161b22', fg:'#f0f6fc', grid:'#21262d' }},
        light:   {{ bg:'#ffffff', nav:'#f8f9fa', fg:'#111111', grid:'#e6e6e6' }},
    }};

    function applyTheme(name) {{
        const t = THEMES[name]; if (!t) return;
        document.body.style.backgroundColor = t.bg;
        document.body.style.color = t.fg;
        document.getElementById('chart-wrapper').style.backgroundColor = t.bg;
        document.querySelector('nav').style.backgroundColor = t.nav;
        document.getElementById('themeLabel').textContent = name;

        const el = document.getElementById('plotly-div') ||
                   document.querySelector('.plotly-graph-div');
        if (el && window.Plotly) {{
            Plotly.relayout(el, {{
                plot_bgcolor: t.bg, paper_bgcolor: t.bg,
                'font.color': t.fg,
                'xaxis.gridcolor': t.grid,  'yaxis.gridcolor': t.grid,
                'xaxis2.gridcolor': t.grid, 'yaxis2.gridcolor': t.grid,
            }});
        }}
        localStorage.setItem('cjtrade-theme', name);
    }}

    // Theme dropdown toggle
    const themeBtn  = document.getElementById('themeBtn');
    const themeMenu = document.getElementById('themeMenu');
    themeBtn.addEventListener('click', () => themeMenu.classList.toggle('hidden'));
    document.addEventListener('click', e => {{
        if (!themeBtn.contains(e.target) && !themeMenu.contains(e.target))
            themeMenu.classList.add('hidden');
    }});
    themeMenu.querySelectorAll('[data-theme]').forEach(a => {{
        a.addEventListener('click', e => {{
            e.preventDefault();
            applyTheme(a.dataset.theme);
            themeMenu.classList.add('hidden');
        }});
    }});

    // ── Live partial-update ────────────────────────────────────────────────────
    // Python rewrites the whole HTML on every kbar append (_auto_save).
    // We detect that by comparing a version stamp embedded in the page itself.
    // On each poll we re-fetch the HTML, extract the new stamp + plotly JSON,
    // and call Plotly.react() — only the chart updates, scroll/theme stay intact.
    const PAGE_URL   = window.location.href.split('?')[0];
    let lastStamp    = document.getElementById('live-stamp')?.textContent?.trim() || '';
    let liveEnabled  = {live_update_enabled};   // Python injects true/false

    function setLiveStatus(active) {{
        const dot  = document.getElementById('liveDot');
        const text = document.getElementById('liveText');
        if (active) {{
            dot.className  = 'inline-block w-2 h-2 rounded-full bg-green-400';
            text.textContent = 'Live';
        }} else {{
            dot.className  = 'inline-block w-2 h-2 rounded-full bg-gray-500';
            text.textContent = 'Static';
        }}
    }}

    async function pollChart() {{
        if (!liveEnabled) return;
        try {{
            const r = await fetch(PAGE_URL + '?t=' + Date.now(), {{cache: 'no-store'}});
            if (!r.ok) {{ setLiveStatus(false); return; }}
            const html = await r.text();

            // Extract stamp
            const stampMatch = html.match(/<span id="live-stamp" style="display:none">(.*?)<\/span>/);
            if (!stampMatch) return;
            const newStamp = stampMatch[1];
            if (newStamp === lastStamp) return;   // no change
            lastStamp = newStamp;

            // Extract embedded plotly JSON
            const jsonMatch = html.match(/<script id="live-data" type="application\/json">([\s\S]*?)<\/script>/);
            if (!jsonMatch) return;
            const fig = JSON.parse(jsonMatch[1]);

            const el = document.getElementById('plotly-div') ||
                       document.querySelector('.plotly-graph-div');
            if (el && window.Plotly) {{
                Plotly.react(el, fig.data, fig.layout, fig.config || {{}});
            }}
        }} catch(e) {{
            // network error or parse error — keep trying silently
        }}
    }}

    // Init
    document.addEventListener('DOMContentLoaded', () => {{
        const saved = localStorage.getItem('cjtrade-theme') || '{theme_name}';
        applyTheme(saved);
        setLiveStatus(liveEnabled);
        if (liveEnabled) setInterval(pollChart, 2000);
    }});
    </script>
</body>
</html>
